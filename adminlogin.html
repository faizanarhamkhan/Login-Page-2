<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
  <style>
   
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
        
        background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
        background-attachment: fixed;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
    }

    
    .admin-card {
        background-color: #ffffff;
        padding: 45px;
        border-radius: 12px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        width: 100%;
        max-width: 420px;
        color: #333;
    }

    h1 {
        text-align: center;
        margin-bottom: 30px;
        font-size: 24px;
        font-weight: 800;
        letter-spacing: 1px;
        color: #1a1a1a;
        text-transform: uppercase;
       
        border-bottom: 4px solid #27ae60;
        display: block;
        padding-bottom: 10px;
    }

    
    .form-group {
        margin-bottom: 20px;
    }

    label {
        display: block;
        font-weight: 700;
        margin-bottom: 8px;
        font-size: 12px;
        color: #444;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    input {
        width: 100%;
        padding: 14px;
        border: 2px solid #eef0f2;
        border-radius: 6px;
        font-size: 15px;
        background-color: #f8f9fa;
        transition: all 0.2s ease;
    }

    input:focus {
        outline: none;
        border-color: #27ae60;
        background-color: #fff;
        box-shadow: 0 0 8px rgba(39, 174, 96, 0.2);
    }

    
    button {
        width: 100%;
        padding: 14px;
        background-color: #1e3d33; 
        color: #ffffff;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    button:hover {
        background-color: #27ae60; 
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);
    }

    button:active {
        transform: translateY(0);
    }

    
    a {
        color: #2c5364;
        display: flex;
        justify-content: center;
        margin-top: 20px;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
        transition: color 0.2s;
    }

    a:hover {
        color: #27ae60;
        text-decoration: underline;
    }
</style>
</head>
<body>
    
    <body>

    <div class="admin-card">
        <h1>Admin Login Portal</h1>
        
        <div class="form-group">
            <label for="email">Admin Email</label>
            <input type="email" id="email" placeholder="admin@domain.com">
        </div>

        <div class="form-group">
            <label for="pass">Secure Password</label>
            <input type="password" id="pass" placeholder="Enter credentials">
        </div>

        <button onclick="adminLogin()">Access Dashboard</button>
        <br>
        <a href="/login.html">Login as a User</a>
    </div>

    </body>

    <script>
            
   
    let users = JSON.parse(localStorage.getItem('users')) || [];

    let adminPass = "admin";
    let adminEmail = "admin@gmail.com";

    function adminLogin() {

    let enteredEmail = document.getElementById('email').value;
    let enteredPass = document.getElementById('pass').value;


    if (enteredEmail === adminEmail && enteredPass === adminPass) {
        alert("Welcome to the Admin Room");
        sessionStorage.setItem("isAdminLoggedIn", "true"); 
        window.location.href = "admindashboard.html"; 
    } else {
        alert("Incorrect Password or Email");
    }
}


    </script>

</body>
</html>
