<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>
    
       
    
   <style>
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
        }

        body {
            
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

       
        .card { 
            background: white; 
            padding: 50px 40px; 
            border-radius: 16px; 
            width: 100%;
            max-width: 450px; 
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4); 
        }

        
        h1 { 
            margin-bottom: 10px; 
            font-size: 32px;
            font-weight: 800;
            color: #1a1a1a;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
        }

      
        .user-info {
            background: #f8f9fa;
            border: 2px solid #eef0f2;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 35px;
        }

        .label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #27ae60; 
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        #displayEmail {
            font-weight: 600;
            color: #333;
            word-break: break-all;
        }

        
        .btn-logout { 
            width: 100%;
            padding: 14px;
            background: #1e3d33; 
            color: white; 
            border: none;
            border-radius: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-logout:hover { 
            background: #e74c3c;
            transform: translateY(2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3);
        }
    </style>
</head>
<body>

    <div class="card">
        
        <h1>Welcome Back!</h1>
        
        <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 30px;">
        
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>

    <script>

        if (sessionStorage.getItem("isLoggedIn") !== "true") {
            alert("Access Denied! Please login first.");
            window.location.href = "login.html"; 
        }
        let userEmail = sessionStorage.getItem("loggedInUser");
        
    
        document.getElementById("displayEmail").innerText = userEmail;

      
        function logout() {
            sessionStorage.clear(); 
            window.location.href = "login.html";
        }
    </script>

</body>
</html>
