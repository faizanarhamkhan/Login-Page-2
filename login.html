<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Inter', -apple-system, system-ui, sans-serif;
    }

    body {
       
        background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
        background-attachment: fixed;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    
    .login-container {
        background-color: #ffffff;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        width: 100%;
        max-width: 400px;
        text-align: center;
    }

    h1 {
        margin-bottom: 30px;
        color: #1a1a1a;
        font-size: 28px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: -1px;
        
        border-bottom: 3px solid #27ae60;
        display: inline-block;
        padding-bottom: 5px;
    }

   
    .form-group {
        text-align: left;
        margin-bottom: 18px;
    }

    label {
        display: block;
        margin-bottom: 8px;
        font-weight: 700;
        color: #444;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    input {
        width: 100%;
        padding: 14px 15px;
        border: 2px solid #eef0f2;
        border-radius: 6px;
        font-size: 15px;
        background-color: #f8f9fa;
        transition: all 0.2s ease;
    }

    input:focus {
        outline: none;
        border-color: #27ae60;
        background-color: #fff;
        box-shadow: 0 0 8px rgba(39, 174, 96, 0.1);
    }

  
    button {
        width: 100%;
        padding: 14px;
        background-color: #1e3d33; /* Dark Forest */
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 10px;
        text-transform: uppercase;
    }

    button:hover {
        background-color: #27ae60; /* Glow Emerald */
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(39, 174, 96, 0.3);
    }

    button:active {
        transform: translateY(0);
    }

    
    .signup-link, .admin-link {
        display: inline-block;
        margin-top: 15px;
        text-decoration: none;
        font-size: 13px;
        font-weight: 600;
        transition: all 0.2s;
    }

    .signup-link {
        color: #27ae60;
    }

    .admin-link {
        color: #2c5364;
        border-top: 1px solid #eee;
        padding-top: 15px;
        margin-top: 20px;
        width: 100%;
    }

    .signup-link:hover, .admin-link:hover {
        color: #1e3d33;
        text-decoration: underline;
    }
</style>
</head>
<body>
    
   <body>

    <div class="login-container">
        <h1>Login</h1>
        
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="">
        </div>

        <div class="form-group">
            <label for="pass">Password</label>
            <input type="password" id="pass" placeholder="">
        </div>

        <button onclick="handleLogin()">Login</button>
        
        <br>
        <a href="/index.html" class="signup-link">New here? Create an Account</a>
        <br>
        <a href="/adminlogin.html" class="admin-link">Admin Portal</a>
    </div>

    </body>

<script>

    let users = JSON.parse(localStorage.getItem('users')) || [];

    function handleLogin(){

    let loginEmail = document.getElementById('email').value;
    let loginPass = document.getElementById('pass').value;

    let userFind = users.find(u => u.email === loginEmail && u.password === loginPass);

    if(!userFind) {
        alert('Create account first.')
        return;
    }

    if(userFind.status === 'pending') {
        alert('Your account is waiting for Admin approval.');
    }else{
        alert('Login Successful! Welcome to the Dashboard.');
        sessionStorage.setItem("isLoggedIn", "true");
        window.location.href = "dashboard.html";
    }

    }



</script>
</body>
</html>
